syntax = "proto3";
package envelope;
option go_package = "./envelope";

message Header {
  uint64 seq = 1;           // 序列(用户维度有序且唯一)
  uint32 cmd = 2;           // 指令(路由)
  uint32 version = 3;       // 版本
  string from_app = 4;      // 源应用名
  string to_app = 5;        // 目标应用名
}

// 输入消息
// client -> gate -> mesh
message IMessage {
  Header header = 1; // 头部信息
  bytes payload = 2; // 业务消息体
}

// 输出消息
// mesh -> gate -> client
message OMessage {
  Header header = 1;      // 头部信息
  MsgType msg_type = 2;   // 消息类型
  Code result = 3;        // 消息结果
  bytes payload = 4;      // 业务消息体
}

enum MsgType {
  UNKNOWN = 0;
  RESPONSE = 1;  // 服务端响应, mesh -> gate -> client
  PUSH = 2;      // 服务端主推, mesh -> gate -> client
}

message Code {
  int32 code = 1; // 消息结果code, 0: 成功, 其它: 失败
  string tip = 2; // 提示信息
}