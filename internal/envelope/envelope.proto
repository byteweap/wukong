syntax = "proto3";
package envelope;
option go_package = "./envelope";

// 统一消息 envelope
message Envelope {
  uint64 seq = 1;    // 唯一标识
  string app = 2;    // 目标应用名
  int32 cmd = 3;    // 指令(路由)
  bytes payload = 4; // 业务消息体
}

// 系统内部事件
enum Event {
  ONLINE = 0;     // 上线 [System]
  OFFLINE = 1;    // 掉线 [System]
  RECONNECT = 2;  // 重连 [System]
  Business = 3;   // 业务 [Business]
}

// 统一消息 gate -> mesh
message Gate2MeshEnvelope {
  Envelope e = 1;
  Event event = 2;
  int64 uid = 3;
}