syntax = "proto3";
option go_package = "./pb";

// EnterGameRequest 进入游戏请求
message EnterGameRequest {
  string tip = 1;
}

// EnterGameResponse 进入游戏响应
message EnterGameResponse {
  string tip = 1;
}

// ExitGameRequest 退出游戏请求
message ExitGameRequest {
  string tip = 1;
}

// ExitGameResponse 退出游戏响应
message ExitGameResponse {
  string tip = 1;
}

// FindRoomRequest 查找房间请求
message FindRoomRequest {
  int32 room_id = 1;
}

// FindRoomResponse 查找房间响应
message FindRoomResponse {
  int32 room_id = 1;
}