syntax = "proto3";
package envelope;
option go_package = "github.com/byteweap/wukong/envelope";

message Header {
  uint64 seq = 1;           // 序列(用户维度有序且唯一)
  uint32 cmd = 2;           // 指令(路由)
  uint32 version = 3;       // 版本
  int64 timestamp = 4;      // 时间戳,ms
}

// 输入消息
// client -> gate -> mesh
message IMessage {
  Header header = 1;  // 头部信息
  string service = 2; // 目标服务名，由业务层进行约束
  bytes payload = 3;  // 业务消息体
}

// 输出消息
// mesh -> gate -> client
message OMessage {
  Header header = 1;      // 头部信息
  string service = 2;     // 发送方的服务名，由业务层进行约束
  MsgType msg_type = 3;   // 消息类型
  Code result = 4;        // 消息结果
  bytes payload = 5;      // 业务消息体
}

enum MsgType {
  UNKNOWN = 0;
  RESPONSE = 1;  // 服务端响应, mesh -> gate -> client
  PUSH = 2;      // 服务端主推, mesh -> gate -> client
}

message Code {
  int32 code = 1; // 消息结果code, 0: 成功, 其它: 失败
  string tip = 2; // 提示信息
}
